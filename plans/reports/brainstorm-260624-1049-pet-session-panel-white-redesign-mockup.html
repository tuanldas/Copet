<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Copet — pet session panel redesign v3</title>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600&family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --color-state-working:#3B82F6; --color-state-waiting:#F59E0B;
    --color-state-done:#22C55E; --color-state-error:#EF4444; --color-state-idle:#94A3B8;
    --color-accent:#8B5CF6;
    --font-body:'Nunito',sans-serif; --font-mono:'JetBrains Mono',monospace; --font-display:'Pixelify Sans',monospace;
    --radius-lg:12px;
    --ink:#1E1E2E; --ink-muted:#64748B; --ink-faint:#94A3B8; --line:rgba(15,23,42,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--font-body);
    background:
      radial-gradient(900px 500px at 20% 0%, #2A2A3C 0%, transparent 60%),
      radial-gradient(700px 500px at 90% 100%, #25253a 0%, transparent 55%),
      #1E1E2E;
    min-height:100vh; padding:36px 28px 56px;
    display:flex; gap:28px; align-items:flex-start; justify-content:center;
  }
  .col{display:flex; flex-direction:column; gap:10px; align-items:center}
  .swatch-label{font-family:var(--font-mono); font-size:12px; color:#cbd5e1; display:flex; align-items:center; gap:8px}
  .swatch-label .chip{width:12px;height:12px;border-radius:3px;border:1px solid rgba(255,255,255,.25)}

  .panel{
    width:400px; background:var(--bg); color:var(--ink);
    border-radius:var(--radius-lg); box-shadow:0 8px 30px rgba(0,0,0,.45);
    border:1px solid var(--line); position:relative;
  }
  .panel::after{ /* caret giữ */
    content:""; position:absolute; left:50%; bottom:-8px; transform:translateX(-50%) rotate(45deg);
    width:16px;height:16px;background:var(--bg);
    border-right:1px solid var(--line);border-bottom:1px solid var(--line);
  }
  .row{padding:12px 14px}
  .row + .row{border-top:1px solid var(--line)}

  .r-head{display:flex; align-items:center; gap:8px}
  .dot{width:8px;height:8px;border-radius:50%; flex:0 0 auto; box-shadow:0 0 0 3px color-mix(in srgb, var(--dot) 18%, transparent)}
  .badge{font-family:var(--font-mono); font-size:11px; font-weight:500; color:#fff; background:var(--dot); border-radius:5px; padding:1px 6px; flex:0 0 auto}
  .name{font-family:var(--font-mono); font-weight:500; font-size:13.5px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1 1 auto; min-width:0}
  .dur{font-family:var(--font-display); font-size:13px; color:var(--ink-muted); flex:0 0 auto; font-variant-numeric:tabular-nums}

  .r-state{margin-top:7px; font-size:12.5px; display:flex; gap:6px; align-items:center}
  .r-state .lab{font-weight:700; color:var(--dot)}

  /* khối lệnh: KHÔNG nền/khung, chỉ text mono xuống dòng riêng */
  .r-cmd{
    margin-top:5px; font-family:var(--font-mono); font-size:11.5px; color:var(--ink);
    line-height:1.5; overflow-wrap:anywhere;
  }
  .r-cmd .tk{color:var(--color-state-working); font-weight:500}     /* tên tool */
  .r-cmd.ask{font-family:var(--font-body); font-size:12.5px; color:var(--ink)}
  .r-cmd.ask b{color:#B45309}                                       /* nhấn lệnh cần duyệt = amber đậm */

  .r-cwd{margin-top:7px; font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:5px}
  .r-cwd svg{flex:0 0 auto; opacity:.6}

  .r-meta{margin-top:8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:11px; color:var(--ink-muted); font-variant-numeric:tabular-nums}
  .pill{font-family:var(--font-mono); font-size:10.5px; color:var(--ink-muted); background:color-mix(in srgb, var(--ink) 6%, transparent); border-radius:5px; padding:2px 6px}
  .tok-in{color:var(--color-state-done); font-weight:700}
  .tok-out{color:var(--color-state-working); font-weight:700}
  .ago{margin-left:auto; color:var(--ink-faint)}
</style>
</head>
<body>
<script>
  const folderSvg='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';
  function panel(bg){
    return `
    <div class="panel" style="--bg:${bg}">
      <div class="row" style="--dot:var(--color-state-working)">
        <div class="r-head">
          <span class="dot" style="background:var(--color-state-working)"></span>
          <span class="badge" style="background:var(--color-state-working)">C</span>
          <span class="name">baitapthuctaposo</span>
          <span class="dur">4m</span>
        </div>
        <div class="r-state"><span class="lab">🍳 Cooking</span></div>
        <div class="r-cmd"><span class="tk">Bash</span> · cd ~/Desktop/Codes/tuanldas/Copet</div>
        <div class="r-meta">
          <span class="pill">opus-4.8</span>
          <span><span class="tok-in">↑12.3k</span> <span class="tok-out">↓3.4k</span></span>
        </div>
      </div>
      <div class="row" style="--dot:var(--color-state-waiting)">
        <div class="r-head">
          <span class="dot" style="background:var(--color-state-waiting)"></span>
          <span class="badge" style="background:var(--color-state-waiting)">Cx</span>
          <span class="name">copet-docs</span>
          <span class="dur">12m</span>
        </div>
        <div class="r-state"><span class="lab">⏳ Chờ duyệt</span></div>
        <div class="r-cmd ask">Cho phép chạy <b>git push origin main</b>?</div>
        <div class="r-meta">
          <span class="pill">gpt-5</span>
          <span><span class="tok-in">↑8.1k</span> <span class="tok-out">↓1.9k</span></span>
        </div>
      </div>
    </div>`;
  }
  const variants=[
    {bg:'#FFFFFF',label:'A · Trắng thuần #FFFFFF'},
    {bg:'#F8FAFC',label:'B · Off-white #F8FAFC'},
    {bg:'#FAFAF9',label:'C · Warm white #FAFAF9'},
  ];
  document.body.innerHTML = variants.map(v=>
    `<div class="col"><div class="swatch-label"><span class="chip" style="background:${v.bg}"></span>${v.label}</div>${panel(v.bg)}</div>`
  ).join('');
</script>
</body>
</html>

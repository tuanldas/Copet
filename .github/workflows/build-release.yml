name: Build Release Artifacts

# Trigger: push to main or manually. Does NOT publish a GitHub Release —
# only uploads per-OS bundles as workflow artifacts for verification.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "crates/**"
      - "*.json"
      - "*.toml"
      - ".github/workflows/build-release.yml"
  workflow_dispatch:

env:
  # Rust toolchain version pinned for reproducibility.
  RUST_VERSION: stable
  # pnpm version must match local (package.json engines or pnpm-lock.yaml).
  PNPM_VERSION: "9"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundle_args: "--bundles dmg,app"
            artifact_name: copet-macos
            artifact_glob: "src-tauri/target/release/bundle/dmg/*.dmg"

          - os: windows-latest
            bundle_args: "--bundles msi,nsis"
            artifact_name: copet-windows
            artifact_glob: "src-tauri/target/release/bundle/**/*.msi"

          - os: ubuntu-latest
            bundle_args: "--bundles appimage,deb"
            artifact_name: copet-linux
            artifact_glob: "src-tauri/target/release/bundle/**/*.AppImage"

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Linux: WebKitGTK dependencies ─────────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      # ── Node.js + pnpm ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      # ── Rust ──────────────────────────────────────────────────────────────────
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      # ── Cache: pnpm store ─────────────────────────────────────────────────────
      - name: Get pnpm store directory
        id: pnpm-cache-dir
        shell: bash
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      # ── Cache: Cargo registry + build artifacts ────────────────────────────────
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build output
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src-tauri/src/**/*.rs', 'crates/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-target-

      # ── Install frontend deps ─────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ── Build sidecars ────────────────────────────────────────────────────────
      - name: Build sidecar binaries
        shell: bash
        run: bash scripts/build-sidecars.sh

      # ── Tauri build ───────────────────────────────────────────────────────────
      - name: Build Tauri app
        run: pnpm tauri build ${{ matrix.bundle_args }}
        env:
          # Unsigned build for MVP. Set these secrets in repo Settings → Secrets
          # when a Developer ID is available (macOS signing + notarization).
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code-signing (OV cert or Azure Key Vault):
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ""

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          # Glob pattern; upload-artifact v4 supports multi-path globs.
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 14
